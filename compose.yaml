services:

  app:
    build: .
    container_name: app
    depends_on:
      - db
    ports:
      - '8080:8080'
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/postgres_db
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: paswd
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      APP_JWT_SECRET: taskdeck-compose-secret-key-taskdeck-compose-secret-key-123456

  db:
    image: postgres:latest
    container_name: db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: paswd
      POSTGRES_DB: postgres_db
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
