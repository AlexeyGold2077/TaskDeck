spring.application.name=taskdeck-test
spring.datasource.url=jdbc:h2:mem:taskdeck;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.docker.compose.enabled=false
app.jwt.secret=taskdeck-test-secret-key-taskdeck-test-secret-key-123456
app.jwt.expiration-ms=3600000
